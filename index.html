<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Quotation System</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1200px; margin: 20px auto; padding: 20px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, button, select { padding: 8px; margin-top: 5px; box-sizing: border-box; }
        .form-group { margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f2f2f2; }
        .item-row, .work-row, .labour-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .item-row input, .work-row input, .labour-row input { flex: 1; }
        .remove-btn { width: 30px; background: #dc3545; color: white; border: none; cursor: pointer; }
        .add-btn { background: #28a745; color: white; border: none; padding: 5px 10px; cursor: pointer; margin-top: 5px; }
        button[type="submit"] { background: #007bff; color: white; border: none; padding: 10px; cursor: pointer; width: 100%; margin-top: 20px; }
        #result { margin-top: 20px; padding: 10px; border-radius: 5px; display: none; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        h3 { margin-bottom: 5px; }
    </style>
</head>
<body>
    <h2>Service Quotation</h2>
    <form id="quoteForm">
        <!-- Customer & Inspection Details -->
        <div class="form-group">
            <label>Customer Name *</label>
            <input type="text" id="customerName" required>
        </div>
        <div class="form-group">
            <label>Contact Number *</label>
            <input type="text" id="contactNumber" required>
        </div>
        <div class="form-group">
            <label>Service Type</label>
            <input type="text" id="serviceType">
        </div>
        <div class="form-group">
            <label>Labour Needed (notes)</label>
            <input type="text" id="labourNeeded" placeholder="e.g., 5 days 2 labour">
        </div>
        <div class="form-group">
            <label>Employee Name</label>
            <input type="text" id="employeeName">
        </div>
        <div class="form-group">
            <label>Inspection Date & Time</label>
            <input type="datetime-local" id="inspectionDateTime">
        </div>

        <!-- Materials Table -->
        <h3>Materials / Items</h3>
        <div id="materialsContainer"></div>
        <button type="button" class="add-btn" onclick="addRow('materials')">Add Material</button>

        <!-- Work Table -->
        <h3>Work / Services</h3>
        <div id="workContainer"></div>
        <button type="button" class="add-btn" onclick="addRow('work')">Add Work</button>

        <!-- Labour Table -->
        <h3>Labour Details</h3>
        <div id="labourContainer"></div>
        <button type="button" class="add-btn" onclick="addRow('labour')">Add Labour Entry</button>

        <!-- Total Amount -->
        <div class="form-group">
            <label>Total Amount</label>
            <input type="text" id="totalAmount" readonly style="background:#e9ecef;">
        </div>

        <button type="submit">Generate Quotation</button>
    </form>

    <div id="result"></div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbymG_PtU05EGsxoR6r9QIvCq4PxlR9Z4ubs2UJuTFNgZkyWmYqISu1XjwoN40UN3g8S/exec';
        
        let materialCounter = 0;
        let workCounter = 0;
        let labourCounter = 0;

        function addRow(type, data = null) {
            const container = document.getElementById(`${type}Container`);
            const rowDiv = document.createElement('div');
            rowDiv.className = `${type}-row`;
            let id;
            if (type === 'materials') id = materialCounter++;
            else if (type === 'work') id = workCounter++;
            else id = labourCounter++;
            rowDiv.dataset.id = id;

            if (type === 'materials') {
                rowDiv.innerHTML = `
                    <input type="text" placeholder="Description" class="mat-desc" value="${data ? escapeHtml(data.description) : ''}">
                    <input type="number" placeholder="Quantity" class="mat-qty" value="${data ? data.quantity : 1}" step="1" min="1">
                    <input type="number" placeholder="Unit Price" class="mat-price" value="${data ? data.unitPrice : 0}" step="0.01" min="0">
                    <input type="text" placeholder="Total" class="mat-total" readonly style="background:#e9ecef;">
                    <button type="button" class="remove-btn" onclick="this.parentElement.remove(); updateTotal();">X</button>
                `;
                const qty = rowDiv.querySelector('.mat-qty');
                const price = rowDiv.querySelector('.mat-price');
                const total = rowDiv.querySelector('.mat-total');
                const update = () => {
                    const q = parseFloat(qty.value) || 0;
                    const p = parseFloat(price.value) || 0;
                    total.value = (q * p).toFixed(2);
                    updateTotal();
                };
                qty.addEventListener('input', update);
                price.addEventListener('input', update);
                update();
            } 
            else if (type === 'work') {
                rowDiv.innerHTML = `
                    <input type="text" placeholder="Description" class="work-desc" value="${data ? escapeHtml(data.description) : ''}">
                    <input type="number" placeholder="Hours" class="work-hours" value="${data ? data.hours : 1}" step="0.5" min="0">
                    <input type="number" placeholder="Rate" class="work-rate" value="${data ? data.rate : 0}" step="0.01" min="0">
                    <input type="text" placeholder="Total" class="work-total" readonly style="background:#e9ecef;">
                    <button type="button" class="remove-btn" onclick="this.parentElement.remove(); updateTotal();">X</button>
                `;
                const hours = rowDiv.querySelector('.work-hours');
                const rate = rowDiv.querySelector('.work-rate');
                const total = rowDiv.querySelector('.work-total');
                const update = () => {
                    const h = parseFloat(hours.value) || 0;
                    const r = parseFloat(rate.value) || 0;
                    total.value = (h * r).toFixed(2);
                    updateTotal();
                };
                hours.addEventListener('input', update);
                rate.addEventListener('input', update);
                update();
            }
            else if (type === 'labour') {
                rowDiv.innerHTML = `
                    <input type="text" placeholder="Description" class="lab-desc" value="${data ? escapeHtml(data.description) : ''}">
                    <input type="number" placeholder="# Labourers" class="lab-manpower" value="${data ? data.manpower : 1}" step="1" min="1">
                    <input type="number" placeholder="Duration (days)" class="lab-duration" value="${data ? data.duration : 1}" step="0.5" min="0">
                    <input type="number" placeholder="Rate per Labour per Day" class="lab-rate" value="${data ? data.ratePerLabourPerDay : 0}" step="0.01" min="0">
                    <input type="text" placeholder="Total" class="lab-total" readonly style="background:#e9ecef;">
                    <button type="button" class="remove-btn" onclick="this.parentElement.remove(); updateTotal();">X</button>
                `;
                const manpower = rowDiv.querySelector('.lab-manpower');
                const duration = rowDiv.querySelector('.lab-duration');
                const rate = rowDiv.querySelector('.lab-rate');
                const total = rowDiv.querySelector('.lab-total');
                const update = () => {
                    const m = parseFloat(manpower.value) || 0;
                    const d = parseFloat(duration.value) || 0;
                    const r = parseFloat(rate.value) || 0;
                    total.value = (m * d * r).toFixed(2);
                    updateTotal();
                };
                manpower.addEventListener('input', update);
                duration.addEventListener('input', update);
                rate.addEventListener('input', update);
                update();
            }
            container.appendChild(rowDiv);
        }

        function updateTotal() {
            let total = 0;
            document.querySelectorAll('.mat-total').forEach(t => total += parseFloat(t.value) || 0);
            document.querySelectorAll('.work-total').forEach(t => total += parseFloat(t.value) || 0);
            document.querySelectorAll('.lab-total').forEach(t => total += parseFloat(t.value) || 0);
            document.getElementById('totalAmount').value = total.toFixed(2);
        }

        function collectData(type) {
            const items = [];
            document.querySelectorAll(`.${type}-row`).forEach(row => {
                if (type === 'materials') {
                    const desc = row.querySelector('.mat-desc').value;
                    const qty = parseFloat(row.querySelector('.mat-qty').value) || 0;
                    const price = parseFloat(row.querySelector('.mat-price').value) || 0;
                    const total = (qty * price).toFixed(2);
                    if (desc.trim() !== '' && qty > 0 && price > 0) {
                        items.push({ description: desc, quantity: qty, unitPrice: price, total: total });
                    }
                } 
                else if (type === 'work') {
                    const desc = row.querySelector('.work-desc').value;
                    const hours = parseFloat(row.querySelector('.work-hours').value) || 0;
                    const rate = parseFloat(row.querySelector('.work-rate').value) || 0;
                    const total = (hours * rate).toFixed(2);
                    if (desc.trim() !== '' && hours > 0 && rate > 0) {
                        items.push({ description: desc, hours: hours, rate: rate, total: total });
                    }
                }
                else if (type === 'labour') {
                    const desc = row.querySelector('.lab-desc').value;
                    const manpower = parseFloat(row.querySelector('.lab-manpower').value) || 0;
                    const duration = parseFloat(row.querySelector('.lab-duration').value) || 0;
                    const rate = parseFloat(row.querySelector('.lab-rate').value) || 0;
                    const total = (manpower * duration * rate).toFixed(2);
                    if (desc.trim() !== '' && manpower > 0 && duration > 0 && rate > 0) {
                        items.push({ description: desc, manpower: manpower, duration: duration, ratePerLabourPerDay: rate, total: total });
                    }
                }
            });
            return items;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Initialize with one empty row in each table
        addRow('materials');
        addRow('work');
        addRow('labour');

        // Form submission
        document.getElementById('quoteForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const payload = {
                customerName: document.getElementById('customerName').value,
                contactNumber: document.getElementById('contactNumber').value,
                serviceType: document.getElementById('serviceType').value,
                labourNeeded: document.getElementById('labourNeeded').value,
                employeeName: document.getElementById('employeeName').value,
                inspectionDateTime: document.getElementById('inspectionDateTime').value,
                materials: collectData('materials'),
                work: collectData('work'),
                labour: collectData('labour'),
                totalAmount: document.getElementById('totalAmount').value
            };

            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = 'Generating quotation, please wait...';
            resultDiv.className = '';

            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                if (result.success) {
                    resultDiv.innerHTML = `Quotation ${result.quoteNumber} created! <a href="${result.pdfUrl}" target="_blank">Download PDF</a>`;
                    resultDiv.className = 'success';
                    // Reset form (optional)
                    document.getElementById('quoteForm').reset();
                    // Reset containers and add one empty row each
                    document.getElementById('materialsContainer').innerHTML = '';
                    document.getElementById('workContainer').innerHTML = '';
                    document.getElementById('labourContainer').innerHTML = '';
                    materialCounter = 0;
                    workCounter = 0;
                    labourCounter = 0;
                    addRow('materials');
                    addRow('work');
                    addRow('labour');
                    updateTotal();
                } else {
                    resultDiv.innerHTML = 'Error: ' + result.error;
                    resultDiv.className = 'error';
                }
            } catch (error) {
                resultDiv.innerHTML = 'Error: ' + error.message;
                resultDiv.className = 'error';
            }
        });
    </script>
</body>
</html>
